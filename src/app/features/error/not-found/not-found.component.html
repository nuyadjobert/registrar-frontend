<div class="min-h-screen bg-gradient-to-br from-[#f5f7fb] to-[#e9ecf1] flex items-center justify-center p-6 font-['DM_Sans'] relative overflow-hidden">

  <!-- Background Blobs -->
  <div class="absolute top-[-150px] right-[-150px] w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-[100px]"></div>
  <div class="absolute bottom-[-150px] left-[-150px] w-[500px] h-[500px] bg-violet-500/10 rounded-full blur-[100px]"></div>
  <div class="absolute top-1/2 right-[10%] w-[350px] h-[350px] bg-blue-500/10 rounded-full blur-[80px]"></div>

  <div class="relative z-10 max-w-md w-full bg-white border border-[#e2e8f0] rounded-3xl shadow-xl p-10 text-center animate-in fade-in slide-in-from-bottom-2 duration-500">

    <!-- 404 Code -->
    <div class="flex justify-center items-center gap-3 mb-8">
      <span class="text-[110px] font-bold leading-none tracking-[-4px] bg-gradient-to-br from-[#4f46e5] via-[#7c3aed] to-[#a855f7] bg-clip-text text-transparent">4</span>
      <span class="text-[110px] font-bold leading-none tracking-[-4px] bg-gradient-to-br from-[#4f46e5] via-[#7c3aed] to-[#a855f7] bg-clip-text text-transparent">0</span>
      <span class="text-[110px] font-bold leading-none tracking-[-4px] bg-gradient-to-br from-[#4f46e5] via-[#7c3aed] to-[#a855f7] bg-clip-text text-transparent">4</span>
    </div>

    <!-- Message -->
    <h1 class="font-['Syne'] text-3xl font-bold text-[#1a202c] tracking-tight mb-3">Page Not Found</h1>
    <p class="text-[#718096] text-[15px] leading-relaxed">
      The page you're looking for doesn't exist or has been moved.
    </p>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-3 mt-10">
      <button (click)="goHome()"
              class="flex-1 bg-[#2C2C2A] hover:bg-[#1f1f1d] text-white font-medium py-4 rounded-2xl transition-all flex items-center justify-center gap-2 text-sm">
        <span>Go to Dashboard</span>
        <span class="text-lg">→</span>
      </button>

      <button (click)="goBack()"
              class="flex-1 border border-[#e2e8f0] hover:bg-[#f8fafc] font-medium py-4 rounded-2xl transition-all flex items-center justify-center gap-2 text-sm">
        <span class="text-lg">←</span>
        <span>Go Back</span>
      </button>
    </div>

    <!-- Footer -->
    <div class="mt-10 pt-6 border-t border-[#edf2f7] text-[#a0aec0] text-xs">
      Error Code: <span class="font-mono">404</span> • Page Not Found
    </div>
  </div>
</div>
