<div class="min-h-screen bg-[#f5f5f7] flex items-center justify-center p-4 font-['DM_Sans'] relative overflow-hidden">

  <!-- Background Blobs -->
  <div class="fixed top-[-120px] right-[-120px] w-[400px] h-[400px] rounded-full bg-indigo-500/10 blur-[80px] pointer-events-none"></div>
  <div class="fixed bottom-[-120px] left-[-120px] w-[400px] h-[400px] rounded-full bg-violet-500/10 blur-[80px] pointer-events-none"></div>

  <div class="w-full max-w-[780px] bg-white rounded-3xl shadow-xl overflow-hidden flex animate-in fade-in slide-in-from-bottom-2 duration-500">

    <!-- Left Side -->
    <div class="hidden lg:flex w-[42%] bg-gradient-to-br from-[#1e1b4b] via-[#3730a3] to-[#4c1d95] p-8 flex-col justify-between relative">
      <div>
        <div class="w-10 h-10 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl flex items-center justify-center text-white mb-6">
          📚
        </div>
        <p class="text-indigo-200 text-xs font-semibold tracking-widest uppercase mb-2">Registrar System</p>
        <h1 class="text-white text-2xl font-bold leading-tight tracking-tight">Your academic hub,<br>all in one place.</h1>
        <p class="text-indigo-200/80 mt-4 text-[15px]">Manage programs, students, enrollments and more with ease.</p>
      </div>

      <div class="space-y-6 mt-auto">
        <div class="flex items-center gap-4 text-white/90 text-sm">
          <div class="w-8 h-8 bg-white/10 rounded-xl flex items-center justify-center">📋</div>
          <span>Program Management</span>
        </div>
        <div class="flex items-center gap-4 text-white/90 text-sm">
          <div class="w-8 h-8 bg-white/10 rounded-xl flex items-center justify-center">👥</div>
          <span>Student Records</span>
        </div>
        <div class="flex items-center gap-4 text-white/90 text-sm">
          <div class="w-8 h-8 bg-white/10 rounded-xl flex items-center justify-center">📝</div>
          <span>Enrollment Tracking</span>
        </div>
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="flex-1 p-8 lg:p-10 bg-white">

      <div class="mb-8">
        <h2 class="font-['Syne'] text-[22px] font-bold text-[#1a202c] tracking-tight">Sign in</h2>
        <p class="text-[#718096] text-[13px] mt-1">Welcome back! Enter your credentials below.</p>
      </div>

      @if (error) {
        <div class="mb-6 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 rounded-2xl p-4 text-sm">
          <span class="text-xl">⚠️</span>
          <span>{{ error }}</span>
        </div>
      }

      <form (ngSubmit)="submit()" #f="ngForm">

        <div class="space-y-5">
          <!-- Email -->
          <div>
            <label class="text-[11px] font-semibold text-[#718096] tracking-wider uppercase block mb-1.5">Email Address</label>
            <div class="relative">
              <input type="email" [(ngModel)]="email" name="email" required
                     class="w-full border border-[#e2e8f0] rounded-2xl px-4 py-3.5 text-[13px] focus:border-[#7F77DD] outline-none pl-11"
                     placeholder="you@example.com">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[#a0aec0] absolute left-4 top-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="text-[11px] font-semibold text-[#718096] tracking-wider uppercase block mb-1.5">Password</label>
            <div class="relative">
              <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required
                     class="w-full border border-[#e2e8f0] rounded-2xl px-4 py-3.5 text-[13px] focus:border-[#7F77DD] outline-none pl-11"
                     placeholder="••••••••">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[#a0aec0] absolute left-4 top-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <button type="button" (click)="showPassword = !showPassword" 
                      class="absolute right-4 top-4 text-[#a0aec0] hover:text-[#534AB7]">
                {{ showPassword ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>
        </div>

        <button type="submit" [disabled]="loading"
                class="mt-8 w-full bg-[#2C2C2A] hover:bg-[#1f1f1d] text-white font-medium py-3.5 rounded-2xl text-[13px] flex items-center justify-center gap-2 transition-all">
          @if (loading) {
            <span class="animate-spin">⟳</span>
            Signing in...
          } @else {
            Sign in
            <span>→</span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
