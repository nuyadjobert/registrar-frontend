<div class="login-wrap">
  <div class="blob blob-tr"></div>
  <div class="blob blob-bl"></div>

  <div class="login-box">

    <!-- Left -->
    <div class="login-left">
      <div class="left-logo">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422A12.083 12.083 0 0121 13c0 5.523-4 10-9 10S3 18.523 3 13c0-.538.05-1.064.144-1.578L12 14z"/>
        </svg>
      </div>
      <p class="left-system">Registrar System</p>
      <h2 class="left-headline">Your academic hub, all in one place.</h2>
      <p class="left-desc">Manage programs, students, and enrollments seamlessly.</p>

      <div class="left-features">
        <div class="left-feature">
          <div class="lf-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <span>Program Management</span>
        </div>
        <div class="left-feature">
          <div class="lf-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            </svg>
          </div>
          <span>Student Records</span>
        </div>
        <div class="left-feature">
          <div class="lf-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
          </div>
          <span>Enrollment Tracking</span>
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="login-right">
      <div class="form-header">
        <h1 class="form-title">Sign in</h1>
        <p class="form-sub">Welcome back! Enter your credentials below.</p>
      </div>

      @if (error) {
        <div class="login-error">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/>
          </svg>
          {{ error }}
        </div>
      }

      <form (ngSubmit)="submit()" #f="ngForm">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" class="form-input"/>
          </div>
        </div>

       <div class="form-group">
  <label class="form-label">Password</label>
  <div class="input-wrap">
    <svg class="input-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
    <input
      [type]="showPassword ? 'text' : 'password'"
      [(ngModel)]="password"
      name="password"
      required
      placeholder="••••••••"
      class="form-input"
    />
    <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
      @if (showPassword) {
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      } @else {
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      }
    </button>
  </div>
</div>

        <button type="submit" [disabled]="loading" class="login-btn">
          @if (loading) {
            <svg class="spin-icon" width="15" height="15" fill="none" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity:0.25"/>
              <path fill="currentColor" d="M4 12a8 8 0 018-8v8z" style="opacity:0.75"/>
            </svg>
            Signing in...
          } @else {
            Sign in
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          }
        </button>
      </form>
    </div>

  </div>
</div>
