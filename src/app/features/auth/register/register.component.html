<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <!-- Background blobs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
    <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-gradient-to-br from-indigo-100 to-violet-100 blur-3xl opacity-40"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-gradient-to-br from-violet-100 to-indigo-100 blur-3xl opacity-30"></div>
  </div>

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-600 to-violet-600 shadow-[0_4px_14px_0_rgba(79,70,229,0.4)] mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422A12.083 12.083 0 0121 13c0 5.523-4 10-9 10S3 18.523 3 13c0-.538.05-1.064.144-1.578L12 14z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create account</h1>
      <p class="text-slate-500 mt-1 font-medium">Set up your registrar account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-[0_4px_20px_-2px_rgba(79,70,229,0.1)] p-8">

      <!-- Error -->
      @if (error) {
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-100 text-red-600 text-sm font-medium">
          {{ error }}
        </div>
      }

      <form (ngSubmit)="submit()" #f="ngForm">

        <!-- Name -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Full name</label>
          <input type="text" [(ngModel)]="name" name="name" required placeholder="Juan dela Cruz" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 focus:border-indigo-500"/>
        </div>

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email address</label>
          <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 focus:border-indigo-500"/>
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
          <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 focus:border-indigo-500"/>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm password</label>
          <input type="password" [(ngModel)]="password_confirmation" name="password_confirmation" required placeholder="••••••••" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-1 focus:border-indigo-500"/>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading" class="w-full flex items-center justify-center gap-2 px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold text-sm shadow-[0_4px_14px_0_rgba(79,70,229,0.3)] transition-all duration-200 hover:-translate-y-0.5 hover:shadow-[0_6px_20px_rgba(79,70,229,0.4)] disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:translate-y-0">
          @if (loading) {
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            <span>Creating account...</span>
          } @else {
            <span>Create account</span>
          }
        </button>

      </form>
    </div>

    <!-- Login link -->
    <p class="text-center text-sm text-slate-500 mt-6">
      Already have an account?
      <a routerLink="/login" class="text-indigo-600 font-semibold hover:text-violet-600 transition-colors duration-200">Sign in</a>
    </p>

  </div>
</div>
