<header class="h-16 bg-white border-b border-slate-100 shadow-soft
               flex items-center justify-between px-6 z-10">

  <!-- Page Title -->
  <div>
    <h1 class="text-lg font-bold text-slate-900 leading-tight">
      Registrar Management System
    </h1>
    <p class="text-xs text-slate-400 font-medium">
      Manage your academic records
    </p>
  </div>

  <!-- Right: User Info -->
  <div class="relative">
    <button
      (click)="showDropdown = !showDropdown"
      class="flex items-center gap-3 px-3 py-2 rounded-xl
             hover:bg-slate-50 transition-all duration-200 group">

      <!-- Avatar -->
      <div class="w-8 h-8 rounded-full bg-gradient-to-br
                  from-indigo-600 to-violet-600
                  flex items-center justify-center text-white
                  text-sm font-bold shadow-btn">
        {{ auth.currentUser()?.name?.charAt(0)?.toUpperCase() ?? 'U' }}
      </div>

      <!-- Name -->
      <div class="text-left hidden sm:block">
        <p class="text-sm font-semibold text-slate-900 leading-tight">
          {{ auth.currentUser()?.name ?? 'User' }}
        </p>
        <p class="text-xs text-slate-400">
          {{ auth.currentUser()?.email ?? '' }}
        </p>
      </div>

      <!-- Chevron -->
      <svg class="w-4 h-4 text-slate-400 transition-transform duration-200"
           [class.rotate-180]="showDropdown"
           fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M19 9l-7 7-7-7"/>
      </svg>
    </button>

    <!-- Dropdown -->
    @if (showDropdown) {
      <div class="absolute right-0 mt-2 w-48 bg-white rounded-xl
                  border border-slate-100 shadow-hover py-1 z-50">
        <button
          (click)="logout()"
          class="w-full flex items-center gap-2 px-4 py-2.5
                 text-sm font-medium text-red-500
                 hover:bg-red-50 transition-all duration-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Logout
        </button>
      </div>
    }
  </div>
</header>
