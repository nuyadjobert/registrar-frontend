<aside
  [class]="isCollapsed() ? 'w-20' : 'w-64'"
  class="relative flex flex-col h-screen bg-white border-r border-slate-100
         shadow-[0_4px_20px_-2px_rgba(79,70,229,0.1)] transition-all duration-300 ease-out z-20">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-100">
    <div class="flex-shrink-0 w-9 h-9 rounded-xl bg-gradient-to-br
                from-indigo-600 to-violet-600 flex items-center justify-center
                shadow-[0_4px_14px_0_rgba(79,70,229,0.3)]">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor"
           stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 14l9-5-9-5-9 5 9 5z"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 14l6.16-3.422A12.083 12.083 0 0121 13c0 5.523-4 10-9 10S3 18.523 3 13c0-.538.05-1.064.144-1.578L12 14z"/>
      </svg>
    </div>
    @if (!isCollapsed()) {
      <div>
        <p class="text-sm font-extrabold text-slate-900 leading-tight">Registrar</p>
        <p class="text-xs text-slate-400 font-medium">Management System</p>
      </div>
    }
  </div>

  <!-- Nav Items -->
  <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
    @for (item of navItems; track item.path) {
      
        <a [routerLink]="item.path"
        routerLinkActive="active-nav"
        [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
        class="nav-link group flex items-center gap-3 px-3 py-2.5 rounded-lg
               text-slate-500 font-medium text-sm
               transition-all duration-200
               hover:bg-slate-50 hover:text-indigo-600">

        <!-- Icon using innerHTML safely -->
        <span class="flex-shrink-0 w-5 h-5">
          <svg class="w-5 h-5" fill="none" stroke="currentColor"
               stroke-width="2" viewBox="0 0 24 24"
               [innerHTML]="getIcon(item.icon)">
          </svg>
        </span>

        @if (!isCollapsed()) {
          <span>{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Collapse Toggle -->
  <div class="px-3 py-4 border-t border-slate-100">
    <button
      (click)="toggle()"
      class="w-full flex items-center justify-center gap-2 px-3 py-2
             rounded-lg text-slate-400 text-sm font-medium
             hover:bg-slate-50 hover:text-indigo-600
             transition-all duration-200">
      <svg class="w-4 h-4 transition-transform duration-300"
           [class.rotate-180]="isCollapsed()"
           fill="none" stroke="currentColor"
           stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
      </svg>
      @if (!isCollapsed()) {
        <span>Collapse</span>
      }
    </button>
  </div>
</aside>
